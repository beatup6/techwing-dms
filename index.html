<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHWING DMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6fb;--surf:#fff;--surf2:#f0f3f9;--bdr:#e3e7f0;--bdr2:#c8cedf;
  --tx:#18192a;--tx2:#52597a;--tx3:#8e96b8;
  --pri:#1e3a8a;--prih:#1d4ed8;--pril:#dbeafe;
  --acc:#0ea5e9;
  --ok:#059669;--ok-bg:#d1fae5;--ok-tx:#065f46;
  --wn:#d97706;--wn-bg:#fef3c7;--wn-tx:#92400e;
  --er:#dc2626;--er-bg:#fee2e2;--er-tx:#991b1b;
  --in-bg:#dbeafe;--in-tx:#1e40af;
  --pu-bg:#ede9fe;--pu-tx:#5b21b6;
  --gy-bg:#f3f4f6;--gy-tx:#374151;
  --r:8px;--rl:12px;--sh:0 1px 4px rgba(0,0,0,.07);--shl:0 8px 24px rgba(0,0,0,.10)
}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--tx);font-size:14px}

/* LOGIN */
#pg-login{display:flex;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(145deg,#0f172a 0%,#1e3a8a 55%,#1d4ed8 100%)}
.lbox{background:var(--surf);border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.32)}
.llogo{text-align:center;margin-bottom:24px}
.llogo img{height:38px;object-fit:contain}
.ltitle{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.lsub{font-size:12px;color:var(--tx3);text-align:center;margin-bottom:28px}
.lgroup{margin-bottom:16px}
.llabel{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:5px;display:block}
.linput{width:100%;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:14px;color:var(--tx);outline:none;transition:.15s}
.linput:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(14,165,233,.12)}
.lbtn{width:100%;padding:12px;background:var(--pri);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;transition:.15s;margin-top:6px;letter-spacing:.02em}
.lbtn:hover{background:var(--prih)}
.lerr{background:var(--er-bg);color:var(--er-tx);border-radius:var(--r);padding:10px 13px;font-size:13px;margin-top:10px;display:none;border-left:3px solid var(--er)}
.lhint{background:var(--in-bg);border-radius:var(--r);padding:12px 14px;margin-top:18px;font-size:12px;color:var(--in-tx)}
.lhint b{display:block;margin-bottom:6px;font-size:13px}
.lhint table{width:100%;border-collapse:collapse}
.lhint td{padding:2px 4px;vertical-align:middle}
.lhint td:last-child{text-align:right;opacity:.7}

/* APP */
#pg-app{display:none;height:100vh;overflow:hidden}
#pg-app.on{display:flex}

/* SIDEBAR */
.sb{width:224px;background:var(--pri);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.tw-logo{color:#fff;font-size:28px;font-weight:800;font-family:'Arial','Malgun Gothic',sans-serif;letter-spacing:.2px;line-height:1;margin-bottom:6px}
.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.70);margin-top:5px;letter-spacing:.02em;white-space:nowrap}
.sb-logo-sub b{color:#fff;font-weight:800}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-sec{font-size:10px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.32);padding:10px 16px 3px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:rgba(255,255,255,.68);font-size:13px;font-weight:500;transition:.15s;border-left:3px solid transparent;user-select:none}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.on{background:rgba(255,255,255,.13);color:#fff;border-left-color:#60a5fa}
.ni svg{width:15px;height:15px;flex-shrink:0}
.nb{margin-left:auto;background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sb-user{padding:13px 16px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;cursor:pointer}
.sb-user:hover{background:rgba(255,255,255,.05)}
.uav{width:32px;height:32px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.uname{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.urole{font-size:11px;color:rgba(255,255,255,.48)}
.uout{margin-left:auto;color:rgba(255,255,255,.38);cursor:pointer;padding:3px;border-radius:4px}
.uout:hover{color:#fff;background:rgba(255,255,255,.1)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 22px;height:54px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.tbtitle{font-size:15px;font-weight:700;flex:1;color:var(--tx)}
.srch{position:relative}
.srch input{width:210px;padding:7px 10px 7px 31px;border:1px solid var(--bdr);border-radius:var(--r);font-size:13px;background:var(--bg);color:var(--tx);outline:none;transition:.15s;font-family:inherit}
.srch input:focus{border-color:var(--acc);background:var(--surf)}
.srch-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--tx3);pointer-events:none}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;border:1px solid transparent;font-family:inherit}
.bp{background:var(--pri);color:#fff;border-color:var(--pri)}.bp:hover{background:var(--prih)}
.bs{background:var(--surf);color:var(--tx);border-color:var(--bdr)}.bs:hover{background:var(--surf2)}
.bd{background:var(--er-bg);color:var(--er-tx);border-color:#fca5a5}
.bk{background:var(--ok-bg);color:var(--ok-tx);border-color:#6ee7b7}
.bsm{padding:4px 9px;font-size:12px}

.page{flex:1;overflow-y:auto;padding:22px}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);box-shadow:var(--sh)}
.ch{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:13px;font-weight:700;color:var(--tx)}
.cb{padding:18px}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.sc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:15px 18px;box-shadow:var(--sh)}
.slb{font-size:11px;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sv{font-size:26px;font-weight:700;line-height:1}
.ss{font-size:11px;color:var(--tx3);margin-top:3px}
.sdot{width:7px;height:7px;border-radius:50%}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tx3);border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--bdr);vertical-align:middle;color:var(--tx)}
tr:last-child td{border-bottom:none}
.trow:hover td{background:var(--surf2);cursor:pointer}
.trow.sel td{background:#eff6ff}
.mono{font-family:monospace;font-size:12px;color:var(--tx3)}
.fw{font-weight:600}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 7px;border-radius:100px;white-space:nowrap}
.bd0{width:5px;height:5px;border-radius:50%;background:currentColor}
.s-draft{background:var(--gy-bg);color:var(--gy-tx)}
.s-review,.s-dept_review,.s-revision{background:var(--wn-bg);color:var(--wn-tx)}
.s-pending{background:var(--in-bg);color:var(--in-tx)}
.s-approved{background:var(--ok-bg);color:var(--ok-tx)}
.s-distributed{background:var(--pu-bg);color:var(--pu-tx)}
.s-obsolete{background:var(--er-bg);color:var(--er-tx)}
.t-proc{background:var(--in-bg);color:var(--in-tx)}
.t-guide{background:var(--pu-bg);color:var(--pu-tx)}
.t-form{background:var(--wn-bg);color:var(--wn-tx)}
.t-std{background:var(--ok-bg);color:var(--ok-tx)}
.r-admin{background:#fdf4ff;color:#86198f}
.r-approver{background:var(--ok-bg);color:var(--ok-tx)}
.r-reviewer{background:var(--in-bg);color:var(--in-tx)}
.r-writer{background:var(--wn-bg);color:var(--wn-tx)}
.r-viewer{background:var(--gy-bg);color:var(--gy-tx)}
.st-active{background:var(--ok-bg);color:var(--ok-tx)}
.st-pending{background:var(--wn-bg);color:var(--wn-tx)}
.st-inactive{background:var(--er-bg);color:var(--er-tx)}

/* FILTERS */
.fbar{display:flex;align-items:center;gap:7px;padding:12px 16px;border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.chip{padding:4px 11px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid var(--bdr);background:var(--surf);color:var(--tx2);cursor:pointer;transition:.15s}
.chip.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.chip:hover:not(.on){border-color:var(--bdr2);background:var(--surf2)}

/* DETAIL PANEL */
.dp{background:var(--surf);border-left:1px solid var(--bdr);width:356px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.dph{padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.dpb{flex:1;overflow-y:auto;padding:15px 16px}
.dpf{padding:11px 16px;border-top:1px solid var(--bdr);display:flex;gap:6px;flex-wrap:wrap}
.xbtn{background:none;border:none;cursor:pointer;color:var(--tx3);padding:2px;border-radius:4px;display:flex}
.xbtn:hover{color:var(--tx);background:var(--surf2)}
.ir{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr)}
.ir:last-child{border-bottom:none}
.irl{font-size:11px;color:var(--tx3)}
.irv{font-size:13px;font-weight:500}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bdr);padding:0 16px}
.tab{padding:9px 11px;font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
.tab.on{color:var(--pri);border-bottom-color:var(--pri)}

/* LIST LAYOUT */
.ll{display:flex;flex:1;overflow:hidden}
.lm{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* WORKFLOW */
.wf{display:flex;align-items:flex-start;margin:14px 0}
.wfs{flex:1;text-align:center;position:relative}
.wfs::after{content:'';position:absolute;top:13px;left:50%;width:100%;height:2px;background:var(--bdr);z-index:0}
.wfs:last-child::after{display:none}
.wfc{width:26px;height:26px;border-radius:50%;background:var(--surf2);border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;margin:0 auto 4px;position:relative;z-index:1;font-size:10px;font-weight:700;color:var(--tx2)}
.wfc.done{background:var(--ok);border-color:var(--ok);color:#fff}
.wfc.cur{background:var(--acc);border-color:var(--acc);color:#fff}
.wfl{font-size:10px;color:var(--tx3);font-weight:500}

/* FORM */
.fg{margin-bottom:14px}
.fl{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:4px;display:block}
.fl span{color:var(--er)}
.fc{width:100%;padding:8px 11px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:13px;color:var(--tx);background:var(--surf);outline:none;transition:.15s;font-family:inherit}
.fc:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(14,165,233,.1)}
select.fc{cursor:pointer}
textarea.fc{resize:vertical;min-height:70px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* PROGRESS */
.pgbar{height:5px;background:var(--surf2);border-radius:3px;overflow:hidden}
.pgfill{height:100%;border-radius:3px;background:var(--ok);transition:width .4s}
.pgfill.w{background:var(--wn)}

/* HISTORY */
.hi{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.hi:last-child{border-bottom:none}
.hd{width:7px;height:7px;border-radius:50%;background:var(--acc);margin-top:5px;flex-shrink:0}
.hv{font-size:12px;font-weight:700}
.hm{font-size:11px;color:var(--tx3)}
.hr{font-size:12px;color:var(--tx2);margin-top:2px}

/* UPLOAD ZONE */
.uz{border:2px dashed var(--bdr2);border-radius:var(--rl);padding:22px;text-align:center;color:var(--tx3);cursor:pointer;transition:.15s}
.uz:hover{border-color:var(--acc);color:var(--acc);background:var(--in-bg)}


/* ELECTRONIC DOCUMENT */
.reg-mode{display:flex;gap:8px;margin-bottom:14px}
.reg-mode button{flex:1;justify-content:center;padding:12px}
.reg-mode button.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.edoc-sheet{background:#fff;width:794px;max-width:100%;min-height:1123px;margin:0 auto;border:1px solid #d1d5db;box-shadow:0 8px 22px rgba(0,0,0,.12);padding:26px;color:#111;font-family:'Malgun Gothic',sans-serif}
.edoc-title{font-size:22px;font-weight:800;text-align:center;margin:10px 0 18px}
.edoc-table{width:100%;border-collapse:collapse;margin-bottom:12px}
.edoc-table th,.edoc-table td{border:1px solid #111;padding:7px 8px;font-size:12px;color:#111;vertical-align:middle}
.edoc-table th{background:#f3f4f6;text-align:center;font-weight:700;text-transform:none;letter-spacing:0}
.edoc-sec{font-size:15px;font-weight:800;margin:18px 0 8px;border-bottom:2px solid #111;padding-bottom:4px}
.edoc-body{white-space:pre-wrap;line-height:1.62;font-size:13px;min-height:70px}
.edoc-cover-grid{display:grid;grid-template-columns:1fr 220px;gap:12px;align-items:start}
.edoc-sign td{height:42px;text-align:center}
.edoc-actions{display:flex;gap:8px;justify-content:flex-end;margin-bottom:12px}
.file-preview{width:100%;height:70vh;border:1px solid var(--bdr);border-radius:var(--r);background:#fff}
@media print{body.print-edoc *{visibility:hidden!important}body.print-edoc #printArea,body.print-edoc #printArea *{visibility:visible!important}body.print-edoc #printArea{position:absolute;left:0;top:0;width:100%}.edoc-actions{display:none!important}.edoc-sheet{box-shadow:none;border:none;width:100%;min-height:auto;margin:0;padding:16mm}}



/* PERMISSION MATRIX */
.perm-wrap{margin-top:14px}
.perm-table th{background:#f8fafc;text-align:center;text-transform:none;letter-spacing:0;color:var(--tx2)}
.perm-table td{text-align:center;font-size:12px}
.perm-table td:nth-child(1),.perm-table td:nth-child(2){font-weight:700;background:#fafafa}
.perm-ok{display:inline-flex;align-items:center;justify-content:center;min-width:42px;padding:3px 8px;border-radius:999px;background:var(--ok-bg);color:var(--ok-tx);font-size:11px;font-weight:800}
.perm-no{display:inline-flex;align-items:center;justify-content:center;min-width:52px;padding:3px 8px;border-radius:999px;background:var(--er-bg);color:var(--er-tx);font-size:11px;font-weight:800}
.level-chip{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:var(--pri);color:#fff;font-weight:900;font-size:13px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(15,23,42,.42);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.mbox{background:var(--surf);border-radius:var(--rl);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shl)}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:15px;font-weight:700}
.mb{padding:18px 22px;overflow-y:auto;flex:1}
.mf{padding:14px 22px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px}

/* TOAST */
.tc{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:7px}
.toast{color:#fff;padding:11px 15px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:var(--shl);display:flex;align-items:center;gap:8px;min-width:210px;animation:tin .2s ease}
.tok{background:#065f46}.terr{background:#991b1b}.tinf{background:#1e40af}
@keyframes tin{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}

/* MISC */
.tag{display:inline-block;font-size:11px;background:var(--surf2);color:var(--tx2);border-radius:4px;padding:1px 7px;margin:2px 1px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.ph{margin-bottom:18px;display:flex;align-items:flex-start;justify-content:space-between}
.ph h1{font-size:20px;font-weight:700}
.ph p{font-size:13px;color:var(--tx2);margin-top:2px}
.div{height:1px;background:var(--bdr);margin:14px 0}
.empty{text-align:center;padding:40px;color:var(--tx3)}
.empty p{font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:4px}
.sec{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--tx)}
.notif-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:var(--r);color:var(--tx2);position:relative}
.notif-btn:hover{background:var(--surf2)}
.ndot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:2px solid var(--surf);display:none}
.npanel{position:fixed;top:55px;right:14px;width:300px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);box-shadow:var(--shl);z-index:90;display:none;max-height:400px;overflow-y:auto}
.npanel.on{display:block}
.nitem{padding:10px 14px;border-bottom:1px solid var(--bdr);cursor:pointer}
.nitem:hover{background:var(--surf2)}
.nitem:last-child{border-bottom:none}
.ntitle{font-size:13px;font-weight:600}
.nmsg{font-size:12px;color:var(--tx3);margin-top:2px}
.pwbar{height:4px;border-radius:2px;margin-top:4px;transition:.3s;background:var(--bdr)}
</style>

<body>

<!-- ════ LOGIN ════ -->

// ────────────────────────────────────────

const today = () => new Date().toISOString().slice(0,10);
const nowStr = () => new Date().toLocaleString('ko-KR',{hour12:false}).slice(0,16);
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const ROLE_PERMS  = {
  admin:    ['dashboard','documents','approval','distribution','register','history','users','audit'],
  approver: ['dashboard','documents','approval','distribution','register','history'],
  reviewer: ['dashboard','documents','approval','register','history'],
  writer:   ['dashboard','documents','register','history'],
  viewer:   ['dashboard','documents','history']
};
function hasPerm(pg){ return (ROLE_PERMS[CU?.role]||[]).includes(pg); }

function sbadge(s){
  const m={draft:['s-draft','임시저장'],review:['s-review','검토요청'],dept_review:['s-dept_review','유관부서검토'],revision:['s-revision','보완요청'],pending:['s-pending','승인대기'],approved:['s-approved','승인완료'],distributed:['s-distributed','배포완료'],obsolete:['s-obsolete','폐지']};
  const [c,l]=m[s]||['s-draft',s]; return `<span class="badge ${c}"><span class="bd0"></span>${l}</span>`;
}
function tbadge(t){
  const m={proc:['t-proc','절차서'],guide:['t-guide','지침서'],form:['t-form','서식'],std:['t-std','표준서']};
  const [c,l]=m[t]||['s-draft',t]; return `<span class="badge ${c}">${l}</span>`;
}
function rbadge(r){
  const m={admin:['r-admin','관리자'],approver:['r-approver','승인자'],reviewer:['r-reviewer','검토자'],writer:['r-writer','작성자'],viewer:['r-viewer','열람자']};
  const [c,l]=m[r]||['r-viewer',r]; return `<span class="badge ${c}">${l}</span>`;
}
function statusBadge(s){
  const m={active:['st-active','활성'],inactive:['st-inactive','비활성'],pending:['s-pending','승인대기']};
  const [c,l]=m[s]||['s-draft',s]; return `<span class="badge ${c}">${l}</span>`;
}
function nearReview(d){ if(!d) return false; const diff=(new Date(d)-new Date())/86400000; return diff>=0&&diff<=90; }

function loading(msg='불러오는 중...'){
  document.getElementById('pc').innerHTML=`<div class="page"><div style="display:flex;align-items:center;gap:10px;padding:40px;color:var(--tx3)"><div class="spinner"></div>${msg}</div></div>`;
}
function toast(msg,cls='tinf'){
  const c=document.getElementById('tc');
  const ic={tok:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>',terr:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',tinf:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'};
  const t=document.createElement('div'); t.className=`toast ${cls}`;
  t.innerHTML=`${ic[cls]||''} ${msg}`; c.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}
function openMo(title,body,foot){
  document.getElementById('mo-title').textContent=title;
  document.getElementById('mo-body').innerHTML=body;
  document.getElementById('mo-foot').innerHTML=foot;
  document.getElementById('mo').classList.add('on');
}
function closeMo(){ document.getElementById('mo').classList.remove('on'); }

const DEPTS=['품질보증팀','생산팀','개발팀','구매팀','영업팀','경영지원팀','연구개발팀'];

function dOpts(sel=''){ return DEPTS.map(d=>`<option value="${d}"${d===sel?' selected':''}>${d}</option>`).join(''); }

// ────────────────────────────────────────
//  DB 헬퍼 (Supabase REST)
// ────────────────────────────────────────
async function dbGet(table, query={}){
  let q = sb.from(table).select(query.select||'*');
  if(query.eq)   Object.entries(query.eq).forEach(([k,v])=>{ q=q.eq(k,v); });
  if(query.neq)  Object.entries(query.neq).forEach(([k,v])=>{ q=q.neq(k,v); });
  if(query.in)   Object.entries(query.in).forEach(([k,v])=>{ q=q.in(k,v); });
  if(query.order) q=q.order(query.order.col,{ascending:query.order.asc??false});
  if(query.limit) q=q.limit(query.limit);
  const {data,error}=await q;
  if(error) throw error;
  return data||[];
}
async function dbInsert(table,row){
  const {data,error}=await sb.from(table).insert(row).select().single();
  if(error) throw error; return data;
}
async function dbUpdate(table,id,patch){
  const {error}=await sb.from(table).update(patch).eq('id',id);
  if(error) throw error;
}
async function dbDelete(table,id){
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error) throw error;
}
async function dbUpsert(table,row,conflict='id'){
  const {data,error}=await sb.from(table).upsert(row,{onConflict:conflict}).select().single();
  if(error) throw error; return data;
}

async function addNotif(userId,title,msg,type='info'){
  try { await dbInsert('notifications',{user_id:userId,title,message:msg,type,is_read:false}); }
  catch(e){ console.warn('notif err',e); }
  if(userId===CU?.id) document.getElementById('ndot').style.display='block';
}
async function addAudit(action,target='',detail=''){
  try { await dbInsert('audit_log',{user_id:CU?.id,action,target,detail,ip:'browser'}); }
  catch(e){ console.warn('audit err',e); }
}
async function pendingCount(){
  const {count}=await sb.from('approvals').select('*',{count:'exact',head:true}).eq('status','pending');
  return count||0;
}
async function refreshBadge(){

}

function subscribeRealtime(){
  if(_realtimeCh) sb.removeChannel(_realtimeCh);
  _realtimeCh = sb.channel('dms-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'documents'},()=>{ if(curPg==='documents') renderDocs(); if(curPg==='dashboard') renderDash(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'approvals'},()=>{ refreshBadge(); if(curPg==='approval') renderApproval(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'distributions'},()=>{ if(curPg==='distribution') renderDist(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'notifications',filter:`user_id=eq.${CU.id}`},()=>{ document.getElementById('ndot').style.display='block'; })
    .subscribe();
}

async function doLogin(){
  const username=document.getElementById('lid').value.trim();
  const pw=document.getElementById('lpw').value;
  const err=document.getElementById('lerr'); err.style.display='none';
  if(!username||!pw){ err.textContent='아이디와 비밀번호를 입력하세요.'; err.style.display='block'; return; }
  const btn=document.getElementById('lbtn'); btn.disabled=true; btn.textContent='로그인 중...';
  try{
    const users=await dbGet('users',{eq:{username,status:'active'}});
    const found=users.find(u=>u.password_hash===pw||u.pw===pw); // plain or hashed
    if(!found){ err.textContent='아이디 또는 비밀번호가 올바르지 않습니다.'; err.style.display='block'; return; }
    CU=found; CU.lastLogin=nowStr();
    await dbUpdate('users',CU.id,{last_login:new Date().toISOString()});
    addAudit('LOGIN','auth',`${CU.name} 로그인`);
    sessionStorage.setItem('dms_cu',JSON.stringify(CU));
    startApp();
  }catch(e){
    err.textContent=`연결 오류: ${e.message}`; err.style.display='block';
  }finally{ btn.disabled=false; btn.textContent='로그인'; }
}
document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!document.getElementById('pg-login').classList.contains('hidden')) doLogin(); });

function doLogout(){
  addAudit('LOGOUT');
  if(_realtimeCh) sb.removeChannel(_realtimeCh);
  CU=null; sessionStorage.removeItem('dms_cu');
  document.getElementById('pg-login').style.display='flex';
  document.getElementById('pg-app').classList.remove('on');
  document.getElementById('lid').value=''; document.getElementById('lpw').value='';
  document.getElementById('lerr').style.display='none';
}

function startApp(){
  document.getElementById('pg-login').style.display='none';
  document.getElementById('pg-app').classList.add('on');
  document.getElementById('u-av').textContent=CU.name[0];
  document.getElementById('u-name').textContent=CU.name;
  document.getElementById('u-role').textContent=`${CU.dept} · ${ROLE_LEVELS[CU.role]||'-'} Level · ${ROLE_LABELS[CU.role]||CU.role}`;
  applyMenuPermissions();
  document.querySelectorAll('.ni[data-pg]').forEach(el=>{ el.onclick=()=>goto(el.dataset.pg); });
  refreshBadge();
  subscribeRealtime();
  // unread notif badge
  sb.from('notifications').select('*',{count:'exact',head:true}).eq('user_id',CU.id).eq('is_read',false)
    .then(({count})=>{ if(count>0) document.getElementById('ndot').style.display='block'; });
  goto('dashboard');
}

async function quickApprove(apprId){
  try{
    const a=await dbGet('approvals',{eq:{id:apprId}}); if(!a[0]) return;
    const doc=await dbGet('documents',{eq:{id:a[0].doc_id}}); if(!doc[0]) return;
    await dbUpdate('approvals',apprId,{status:'approved',approver_id:CU.id,decided_at:new Date().toISOString()});
    await dbUpdate('documents',a[0].doc_id,{status:'approved',updated_at:new Date().toISOString()});
    await addNotif(a[0].requester_id,`승인 완료: ${doc[0].title}`,`${doc[0].doc_no} 문서가 승인되었습니다.`,'success');
    await addAudit('APPROVE',doc[0].doc_no,doc[0].title);
    refreshBadge(); toast('승인되었습니다.','tok'); renderDash();
  }catch(e){ toast('오류: '+e.message,'terr'); }
}

let _allDocs=[], _allUsers=[];

async function renderDocs(){
  loading();
  try{
    _allUsers=await dbGet('users');
    const userMap=Object.fromEntries(_allUsers.map(u=>[u.id,u]));
    let q=sb.from('documents').select('*').order('updated_at',{ascending:false});
    if(srchQ){ q=q.or(`title.ilike.%${srchQ}%,doc_no.ilike.%${srchQ}%,dept.ilike.%${srchQ}%`); }
    if(filt!=='all'){
      if(['proc','guide','form','std'].includes(filt)) q=q.eq('doc_type',filt);
      else if(filt==='review') q=q.in('status',['review','dept_review','revision']);
      else q=q.eq('status',filt);
    }
    const {data:docs}=await q; _allDocs=docs||[];
    renderDocList(userMap);
    if(selDocId) renderDP(selDocId,userMap);
  }catch(e){ document.getElementById('pc').innerHTML=`<div class="page"><div style="color:var(--er)">오류: ${esc(e.message)}</div></div>`; }
}

async function submitDoc(docId){
  try{
    const [doc]=await dbGet('documents',{eq:{id:docId}});
    await dbUpdate('documents',docId,{status:'review',updated_at:new Date().toISOString()});
    const [apprUser]=await dbGet('users',{in:{role:['approver','admin']}});
    await dbInsert('approvals',{doc_id:docId,requester_id:CU.id,approver_id:apprUser?.id,action_type:'new',status:'pending'});
    if(apprUser) await addNotif(apprUser.id,`결재 요청: ${doc.title}`,`${doc.doc_no} 결재가 요청되었습니다.`,'warning');
    await addAudit('SUBMIT_DOC',doc.doc_no,doc.title);
    refreshBadge(); toast('결재 상신이 완료되었습니다.','tok'); selDocId=null; renderDocs();
  }catch(e){ toast('오류: '+e.message,'terr'); }
}

function showDistMo(docId){
  openMo('배포 대상 부서 선택',

async function confirmDist(docId){
  const chks=document.querySelectorAll('.dist-chk:checked');
  const depts=Array.from(chks).map(c=>c.value);
  if(!depts.length){ toast('배포 대상 부서를 선택하세요.','terr'); return; }
  try{
    const [doc]=await dbGet('documents',{eq:{id:docId}});
    await dbUpdate('documents',docId,{status:'distributed',updated_at:new Date().toISOString()});
    for(const dept of depts){
      const deptUsers=await dbGet('users',{eq:{dept,status:'active'}});
      for(const u of deptUsers){
        const ex=await dbGet('distributions',{eq:{doc_id:docId,user_id:u.id}});
        if(!ex.length) await dbInsert('distributions',{doc_id:docId,dept,user_id:u.id,confirmed:false});
        await addNotif(u.id,`새 문서 배포: ${doc.title}`,`${doc.doc_no} 문서를 확인해주세요.`,'info');
      }
    }
    await addAudit('DISTRIBUTE',doc.doc_no,depts.join(','));
    closeMo(); toast('배포가 완료되었습니다.','tok'); selDocId=null; renderDocs();
  }catch(e){ toast('오류: '+e.message,'terr'); }
}

function showReviseMo(docId){
  openMo('개정 신청',

async function confirmRevise(docId){
  const reason=document.getElementById('rv-reason').value.trim();
  if(!reason){ toast('개정 사유를 입력하세요.','terr'); return; }
  try{
    const [doc]=await dbGet('documents',{eq:{id:docId}});
    const num=parseInt((doc.version.match(/\d+/)||['1'])[0])+1;
    const newVer=`Rev.${num}`;
    await dbUpdate('documents',docId,{version:newVer,status:'draft',updated_at:new Date().toISOString()});
    await dbInsert('revisions',{doc_id:docId,version:newVer,author_id:CU.id,reason,changes:document.getElementById('rv-changes').value});
    await addAudit('REVISE',doc.doc_no,reason);
    closeMo(); toast(`개정 신청 완료 (${newVer})`,'tok'); selDocId=null; renderDocs();
  }catch(e){ toast('오류: '+e.message,'terr'); }
}

async function renderDist(){
  loading();
  try{
    const docs=await dbGet('documents',{eq:{status:'distributed'},order:{col:'updated_at',asc:false}});
    const dists=await dbGet('distributions');
    document.getElementById('pc').innerHTML=`
    <div class="page">
      <div class="ph"><div><h1>배포 관리</h1><p>부서별 열람 확인 현황</p></div></div>
      ${docs.length===0?'<div class="card"><div class="empty"><p>배포된 문서가 없습니다</p></div></div>':
      docs.map(doc=>{
        const dd=dists.filter(x=>x.doc_id===doc.id);
        const deptMap={};
        dd.forEach(x=>{ if(!deptMap[x.dept]) deptMap[x.dept]={total:0,confirmed:0}; deptMap[x.dept].total++; if(x.confirmed) deptMap[x.dept].confirmed++; });
        const total=dd.length; const conf=dd.filter(x=>x.confirmed).length;
        const pct=total>0?Math.round(conf/total*100):0;
        return `<div class="card" style="margin-bottom:14px">
          <div class="ch">
            <div><div style="display:flex;align-items:center;gap:8px"><span class="mono">${esc(doc.doc_no)}</span><span style="font-size:14px;font-weight:700">${esc(doc.title)}</span>${tbadge(doc.doc_type)}</div>
            <div style="font-size:12px;color:var(--tx3);margin-top:3px">배포일: ${(doc.updated_at||'').slice(0,10)} · ${esc(doc.version)}</div></div>
            <div style="text-align:right"><div style="font-size:24px;font-weight:700;color:${pct>=90?'var(--ok)':pct>=70?'var(--wn)':'var(--er)'}">${pct}%</div><div style="font-size:11px;color:var(--tx3)">${conf}/${total}명</div></div>
          </div>
          <div class="cb" style="padding-top:10px">
            <div class="pgbar" style="height:7px;margin-bottom:14px"><div class="pgfill${pct<80?' w':''}" style="width:${pct}%"></div></div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">
              ${Object.entries(deptMap).map(([dept,{total:dt,confirmed:dc}])=>{
                const p=dt>0?Math.round(dc/dt*100):0;
                return `<div style="padding:9px 12px;background:var(--surf2);border-radius:var(--r)">
                  <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:13px;font-weight:600">${esc(dept)}</span><span style="font-size:12px;color:${p===100?'var(--ok)':'var(--tx3)'}">${p}%</span></div>
                  <div class="pgbar"><div class="pgfill${p<80?' w':''}" style="width:${p}%"></div></div>
                  <div style="font-size:11px;color:var(--tx3);margin-top:3px">${dc}/${dt}명</div>
                </div>`;}).join('')}
            </div>
            ${CU.role!=='admin'&&CU.role!=='approver'?`<button class="btn bk bsm" style="margin-top:10px" onclick="confirmRead(${doc.id})">내 열람 확인</button>`:''}
          </div>
        </div>`;}).join('')}
    </div>`;
  }catch(e){ document.getElementById('pc').innerHTML=`<div class="page"><div style="color:var(--er)">오류: ${esc(e.message)}</div></div>`; }
}

async function createDoc(status){
  const docNo=document.getElementById('f-no').value.trim();
  const title=document.getElementById('f-title').value.trim();
  if(!docNo||!title){ toast('문서번호와 문서명은 필수입니다.','terr'); return null; }
  const tags=document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  try{
    const ex=await dbGet('documents',{eq:{doc_no:docNo}});
    if(ex.length){ toast('이미 존재하는 문서번호입니다.','terr'); return null; }
    const doc=await dbInsert('documents',{
      doc_no:docNo, title, doc_type:document.getElementById('f-type').value,
      dept:document.getElementById('f-dept').value,
      owner_id:parseInt(document.getElementById('f-owner').value)||CU.id,
      version:document.getElementById('f-ver').value||'Rev.1', status,
      tags:JSON.stringify(tags),
      review_date:document.getElementById('f-review').value||null,
      reason:document.getElementById('f-reason').value
    });
    await dbInsert('revisions',{doc_id:doc.id,version:doc.version,author_id:CU.id,reason:doc.reason||'최초 작성',changes:'신규 문서 작성'});
    await addAudit('CREATE_DOC',docNo,title);
    return doc;
  }catch(e){ toast('오류: '+e.message,'terr'); return null; }
}

async function saveDraftDoc(){
  const doc=await createDoc('draft'); if(!doc) return;
  toast('임시저장되었습니다.','tok'); goto('documents');
}

async function submitNewDoc(){
  const doc=await createDoc('review'); if(!doc) return;
  const [apprUser]=await dbGet('users',{in:{role:['approver','admin']}});
  await dbInsert('approvals',{doc_id:doc.id,requester_id:CU.id,approver_id:apprUser?.id,action_type:'new',status:'pending'});
  if(apprUser) await addNotif(apprUser.id,`결재 요청: ${doc.title}`,`${doc.doc_no} 결재가 요청되었습니다.`,'warning');
  refreshBadge(); toast('결재 상신이 완료되었습니다.','tok'); goto('documents');
}

async function addUser(){

function checkPwStr(v){
  const b=document.getElementById('pwbar2'); if(!b) return;
  const s=v.length>=10&&/[A-Z]/.test(v)&&/[0-9]/.test(v)?3:v.length>=8?2:v.length>=6?1:0;
  b.style.background=['var(--bdr)','var(--er)','var(--wn)','var(--ok)'][s];
  b.style.width=['0%','33%','66%','100%'][s];
}
async function changePw(){
  const oldPw=document.getElementById('cp-old').value;
  const np=document.getElementById('cp-new').value;
  const cf=document.getElementById('cp-cf').value;
  if(oldPw!==CU.password_hash&&oldPw!==CU.pw){ toast('현재 비밀번호가 올바르지 않습니다.','terr'); return; }
  if(np.length<6){ toast('새 비밀번호는 6자 이상이어야 합니다.','terr'); return; }
  if(np!==cf){ toast('새 비밀번호가 일치하지 않습니다.','terr'); return; }
  await dbUpdate('users',CU.id,{password_hash:np});
  CU.password_hash=np; sessionStorage.setItem('dms_cu',JSON.stringify(CU));
  closeMo(); toast('비밀번호가 변경되었습니다.','tok');
}
